repos:
  # Go linting and formatting
  - repo: local
    hooks:
      - id: go-fmt
        name: go-fmt
        entry: gofmt -w
        language: system
        types: [go]
        pass_filenames: true
        
      - id: go-vet
        name: go-vet
        entry: go vet
        language: system
        types: [go]
        pass_filenames: false
        always_run: true
        
      - id: go-imports
        name: go-imports
        entry: goimports -w
        language: system
        types: [go]
        pass_filenames: true
        
      - id: go-lint
        name: go-lint
        entry: golint
        language: system
        types: [go]
        pass_filenames: true

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
      - id: check-case-conflict

  # Markdown formatting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [markdown, yaml, json]
        args: ['--prose-wrap=always']

  # Go tests
  - repo: local
    hooks:
      - id: go-test
        name: go-test
        entry: go test ./...
        language: system
        types: [go]
        pass_filenames: false
        always_run: true
